<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Sister ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
position:relative;
}

.screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100vh;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
padding:25px;
text-align:center;
animation:fade .7s ease;
}

.screen.active{
display:flex;
}

h1{
font-size:32px;
color:white;
margin-bottom:20px;
}

p{
font-size:22px;
color:white;
line-height:1.6;
margin-bottom:35px;
max-width:350px;
}

button{
padding:16px 32px;
font-size:18px;
border:none;
border-radius:50px;
background:white;
color:#ff4d88;
font-weight:700;
cursor:pointer;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
transition:0.3s;
}

button:active{
transform:scale(.95);
}

.photo{
width:85vw;
max-width:330px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
animation:pop 1s ease;
margin-bottom:25px;
}

.heart{
position:absolute;
font-size:30px;
animation:float 4s linear infinite;
opacity:.7;
}

.heart:nth-child(1){
left:10%;
animation-delay:0s;
}

.heart:nth-child(2){
left:50%;
animation-delay:1s;
}

.heart:nth-child(3){
left:80%;
animation-delay:2s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes pop{
from{
transform:scale(.5);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-100px);
opacity:0;
}

}

</style>
</head>

<body>

<div class="heart">❤️</div>
<div class="heart">💖</div>
<div class="heart">💕</div>

<div class="screen active" id="s1">

<h1>💌 Hey Sister</h1>

<button onclick="show('s2')">
Open Me
</button>

</div>


<div class="screen" id="s2">

<p>
Do you know who is my favourite?
</p>

<button onclick="show('s3')">
Click To Know
</button>

</div>


<div class="screen" id="s3">

<p>
Aww! You are looking beautiful while smiling 😊
<br><br>
Always smile like this ❤️
</p>

<button onclick="show('s4')">
Still Wanna Know?
</button>

</div>


<div class="screen" id="s4">

<p>
Okay Okay, Here You Go 😄
</p>

<button onclick="show('s5')">
Last Button
</button>

</div>


<div class="screen" id="s5">

<img src="1000208450.jpg" class="photo">

<h1>Yes, It's You ❤️</h1>

<p>
My Favourite Person Forever ✨<br>
Keep Smiling Always 😊
</p>

</div>


<script>

function show(id){

document.querySelectorAll(".screen").forEach(function(screen){

screen.classList.remove("active");

});

document.getElementById(id).classList.add("active");

}

</script>

</body>
</html>
